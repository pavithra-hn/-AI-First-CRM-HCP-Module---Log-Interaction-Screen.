services:
  postgres:
    image: postgres:15
    container_name: crm-hcp-postgres
    environment:
      POSTGRES_DB: crm_hcp
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
